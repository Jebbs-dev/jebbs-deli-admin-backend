# pnpm config only (not a multi-package workspace).
# Shared code lives in libs/ via TypeScript path aliases.
packages:
  - '.'

allowBuilds:
  '@nestjs/core': true
  '@prisma/client': true
  '@prisma/engines': true
  '@scarf/scarf': true
  bcrypt: true
  esbuild: true
  prisma: true

overrides:
  '@types/express-serve-static-core': ~4.19.0
